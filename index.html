<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect 5 Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --grid-color: #000000;
            --x-color: #ff4d4d;
            --o-color: #4d79ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Чтобы не было случайных скроллов */
            touch-action: manipulation;
        }

        /* Экран выбора */
        #setup-screen {
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 24px; margin-bottom: 30px; }

        .btn {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid var(--grid-color);
            background: #fff;
            margin: 10px;
            font-weight: bold;
            border-radius: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Игровой контейнер */
        #game-container {
            display: none;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .status {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* Адаптивная сетка */
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 1px;
            background-color: var(--grid-color);
            border: 2px solid var(--grid-color);
            /* Поле занимает 95% ширины экрана */
            width: 95vw;
            height: calc(95vw * 7 / 9); 
            margin: 0 auto;
        }

        .cell {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(8vw, 35px); /* Размер шрифта зависит от экрана */
            font-weight: 900;
        }

        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .undo-btn { background: #eee; border-color: #ccc; }
        .restart-btn { background: #333; color: #fff; }

        #winner-msg {
            color: #28a745;
            font-weight: bold;
            margin-top: 10px;
            height: 24px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Кто ходит первым?</h1>
        <button class="btn" style="color:var(--x-color)" id="btn-x">Крестики (X)</button>
        <button class="btn" style="color:var(--o-color)" id="btn-o">Нолики (O)</button>
    </div>

    <div id="game-container">
        <div class="status" id="turn-indicator">Ход: Крестики</div>
        <div class="grid" id="board"></div>
        <div id="winner-msg"></div>
        <div class="controls">
            <button class="btn undo-btn" id="undo-move">↩ Отмена</button>
            <button class="btn restart-btn" id="reset-game">Заново</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение

        const ROWS = 7;
        const COLS = 9;
        let board = [];
        let currentPlayer = 'X';
        let gameActive = false;
        let moveHistory = [];

        function initBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
        }

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[r][c] ? ' ' + board[r][c].toLowerCase() : '');
                    cell.textContent = board[r][c] || '';
                    cell.onclick = () => handleMove(c);
                    boardEl.appendChild(cell);
                }
            }
        }

        function handleMove(col) {
            if (!gameActive) return;

            let row = -1;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (!board[r][col]) {
                    row = r;
                    break;
                }
            }

            if (row === -1) return;

            // Вибрация при каждом ходе (легкий удар)
            tg.HapticFeedback.impactOccurred('light');

            board[row][col] = currentPlayer;
            moveHistory.push({row, col, player: currentPlayer});
            
            if (checkWin(row, col)) {
                // Вибрация при победе
                tg.HapticFeedback.notificationOccurred('success');
                gameActive = false;
                document.getElementById('winner-msg').textContent = `Победа ${currentPlayer}!`;
                document.getElementById('turn-indicator').textContent = 'Финиш';
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateStatus();
            }
            render();
        }

        function checkWin(r, c) {
            const directions = [[0,1], [1,0], [1,1], [1,-1]];
            for (let [dr, dc] of directions) {
                let count = 1;
                count += scan(r, c, dr, dc);
                count += scan(r, c, -dr, -dc);
                if (count >= 5) return true;
            }
            return false;
        }

        function scan(r, c, dr, dc) {
            let count = 0;
            let currR = r + dr;
            let currC = c + dc;
            while (currR >= 0 && currR < ROWS && currC >= 0 && currC < COLS && board[currR][currC] === currentPlayer) {
                count++;
                currR += dr;
                currC += dc;
            }
            return count;
        }

        function updateStatus() {
            const el = document.getElementById('turn-indicator');
            el.textContent = `Ход: ${currentPlayer === 'X' ? 'Крестики' : 'Нолики'}`;
            el.style.color = currentPlayer === 'X' ? 'var(--x-color)' : 'var(--o-color)';
        }

        function undo() {
            if (moveHistory.length === 0) return;
            tg.HapticFeedback.impactOccurred('medium');
            const last = moveHistory.pop();
            board[last.row][last.col] = null;
            currentPlayer = last.player;
            gameActive = true;
            document.getElementById('winner-msg').textContent = '';
            updateStatus();
            render();
        }

        // Слушатели кнопок
        document.getElementById('btn-x').onclick = () => start('X');
        document.getElementById('btn-o').onclick = () => start('O');
        document.getElementById('undo-move').onclick = undo;
        document.getElementById('reset-game').onclick = () => {
            tg.HapticFeedback.impactOccurred('heavy');
            location.reload();
        };

        function start(player) {
            tg.HapticFeedback.impactOccurred('medium');
            currentPlayer = player;
            initBoard();
            gameActive = true;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            updateStatus();
            render();
        }

        tg.ready();
    </script>
</body>
</html>
