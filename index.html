<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect 5 Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --grid-color: #000000;
            --x-color: #ff4d4d;
            --o-color: #4d79ff;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        #setup-screen {
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 24px; margin-bottom: 20px; }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid var(--grid-color);
            background: #fff;
            margin: 10px;
            font-weight: bold;
            border-radius: 8px;
        }

        #game-container {
            display: none;
            width: 100%;
            text-align: center;
        }

        .status {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 1px;
            background-color: var(--grid-color);
            border: 2px solid var(--grid-color);
            width: 95vw;
            max-width: 500px;
            height: calc(95vw * 7 / 9); 
            max-height: calc(500px * 7 / 9);
            margin: 0 auto;
        }

        .cell {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
        }

        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }

        .controls {
            margin-top: 20px;
        }

        #winner-msg {
            color: #28a745;
            font-weight: bold;
            font-size: 20px;
            margin-top: 15px;
            min-height: 25px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Кто ходит первым?</h1>
        <button class="btn" style="color:var(--x-color)" onclick="startGame('X')">Крестики (X)</button>
        <button class="btn" style="color:var(--o-color)" onclick="startGame('O')">Нолики (O)</button>
    </div>

    <div id="game-container">
        <div class="status" id="turn-indicator">Ход: Крестики</div>
        <div class="grid" id="board"></div>
        <div id="winner-msg"></div>
        <div class="controls">
            <button class="btn" style="background:#eee" onclick="undoMove()">↩ Отмена</button>
            <button class="btn" style="background:#333; color:#fff" onclick="resetGame()">Заново</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram (если доступен)
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
            }
        } catch (e) {}

        // Безопасная вибрация
        function vibrate(type) {
            try {
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    if (type === 'success') {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    } else {
                        window.Telegram.WebApp.HapticFeedback.impactOccurred(type);
                    }
                }
            } catch (e) {}
        }

        // Переменные игры
        var ROWS = 7;
        var COLS = 9;
        var board = [];
        var currentPlayer = 'X';
        var gameActive = false;
        var moveHistory = [];

        // Функция старта (вызывается при нажатии на кнопку)
        function startGame(player) {
            vibrate('medium');
            currentPlayer = player;
            gameActive = true;
            moveHistory = [];
            
            // Создаем пустое поле
            board = [];
            for (var r = 0; r < ROWS; r++) {
                var row = [];
                for (var c = 0; c < COLS; c++) {
                    row.push(null);
                }
                board.push(row);
            }

            document.getElementById('winner-msg').textContent = '';
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            updateStatus();
            renderBoard();
        }

        // Отрисовка поля
        function renderBoard() {
            var boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (var r = 0; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    var cell = document.createElement('div');
                    cell.className = 'cell';
                    if (board[r][c] === 'X') {
                        cell.className += ' x';
                        cell.textContent = 'X';
                    } else if (board[r][c] === 'O') {
                        cell.className += ' o';
                        cell.textContent = 'O';
                    }
                    
                    // Привязываем клик к столбцу
                    cell.setAttribute('onclick', 'handleMove(' + c + ')');
                    boardEl.appendChild(cell);
                }
            }
        }

        // Обработка хода
        function handleMove(col) {
            if (!gameActive) return;

            var targetRow = -1;
            for (var r = ROWS - 1; r >= 0; r--) {
                if (board[r][col] === null) {
