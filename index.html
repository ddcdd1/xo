<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect 5 Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --grid-color: #000000;
            --x-color: #ff4d4d;
            --o-color: #4d79ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #setup-screen {
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 24px; margin-bottom: 30px; }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid var(--grid-color);
            background: #fff;
            margin: 10px;
            font-weight: bold;
            border-radius: 12px;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }

        #game-container {
            display: none;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .status {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 1px;
            background-color: var(--grid-color);
            border: 2px solid var(--grid-color);
            width: 95vw;
            max-width: 450px;
            height: calc(95vw * 7 / 9); 
            max-height: calc(450px * 7 / 9);
            margin: 0 auto;
        }

        .cell {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(8vw, 30px);
            font-weight: 900;
            cursor: pointer;
        }

        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .undo-btn { background: #f0f0f0; border-color: #ccc; }
        .restart-btn { background: #333; color: #fff; }

        #winner-msg {
            color: #28a745;
            font-weight: bold;
            font-size: 20px;
            margin-top: 15px;
            height: 24px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Кто ходит первым?</h1>
        <button class="btn" style="color:var(--x-color)" id="btn-x">Крестики (X)</button>
        <button class="btn" style="color:var(--o-color)" id="btn-o">Нолики (O)</button>
    </div>

    <div id="game-container">
        <div class="status" id="turn-indicator">Ход: Крестики</div>
        <div class="grid" id="board"></div>
        <div id="winner-msg"></div>
        <div class="controls">
            <button class="btn undo-btn" id="undo-move">↩ Отмена</button>
            <button class="btn restart-btn" id="reset-game">Заново</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Безопасная инициализация Telegram Web App
            let tg = null;
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                try {
                    tg.expand();
                    tg.ready();
                } catch (e) { console.error("Ошибка инициализации TG:", e); }
            }

            // Безопасная функция вибрации (не ломает код, если запущено на ПК)
            function vibrate(type) {
                if (!tg || !tg.HapticFeedback) return;
                try {
                    if (type === 'success') {
                        tg.HapticFeedback.notificationOccurred('success');
                    } else {
                        tg.HapticFeedback.impactOccurred(type);
                    }
                } catch (e) {} // Игнорируем ошибку, если устройство не поддерживает
            }

            const ROWS = 7;
            const COLS = 9;
            let board = [];
            let currentPlayer = 'X';
            let gameActive = false;
            let moveHistory = [];

            // Кэшируем элементы
            const setupScreen = document.getElementById('setup-screen');
            const gameContainer = document.getElementById('game-container');
            const boardEl = document.getElementById('board');
            const turnIndicator = document.getElementById('turn-indicator');
            const winnerMsg = document.getElementById('winner-msg');

            function initBoard() {
                board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
            }

            function start(player) {
                vibrate('medium');
                currentPlayer = player;
                initBoard();
                moveHistory = [];
                gameActive = true;
                winnerMsg.textContent = '';
                
                setupScreen.style.display = 'none';
                gameContainer.style.display = 'block';
                
                updateStatus();
                render();
            }

            function render() {
                boardEl.innerHTML = '';
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell' + (board[r][c] ? ' ' + board[r][c].toLowerCase() : '');
                        cell.textContent = board[r][c] || '';
                        
                        // Безопасное добавление обработчика клика
                        cell.addEventListener('click', () => handleMove(c));
                        boardEl.appendChild(cell);
                    }
                }
            }

            function handleMove(col) {
                if (!gameActive) return;

                let row = -1;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (!board[r][col]) {
                        row = r;
                        break;
                    }
                }

                if (row === -1) return; // Столбец заполнен

                vibrate('light');

                board[row][col] = currentPlayer;
                moveHistory.push({row, col, player: currentPlayer});
                
                if (checkWin(row, col)) {
                    vibrate('success');
                    gameActive = false;
                    winnerMsg.textContent = `Победили ${currentPlayer === 'X' ? 'Крестики' : 'Нолики'}!`;
                    turnIndicator.textContent = 'Игра окончена';
                    turnIndicator.style.color = '#888';
                } else if (moveHistory.length === ROWS * COLS) {
                    gameActive = false;
                    winnerMsg.textContent = 'Ничья!';
                    turnIndicator.textContent = 'Игра окончена';
                } else {
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                    updateStatus();
                }
                render();
            }

            function checkWin(r, c) {
                const directions = [[0,1], [1,0], [1,1], [1,-1]];
                for (let [dr, dc] of directions) {
                    let count = 1;
                    count += scan(r, c, dr, dc);
                    count += scan(r, c, -dr, -dc);
                    if (count >= 5) return true;
                }
                return false;
            }

            function scan(r, c, dr, dc) {
                let count = 0;
                let currR = r + dr;
                let currC = c + dc;
                while (currR >= 0 && currR < ROWS && currC >= 0 && currC < COLS && board[currR][currC] === currentPlayer) {
                    count++;
                    currR += dr;
                    currC += dc;
                }
                return count;
            }

            function updateStatus() {
                turnIndicator.textContent = `Ход: ${currentPlayer === 'X' ? 'Крестики' : 'Нолики'}`;
                turnIndicator.style.color = currentPlayer === 'X' ? 'var(--x-color)' : 'var(--o-color)';
            }

            function undo() {
                if (moveHistory.length === 0) return;
                vibrate('medium');
                const last = moveHistory.pop();
                board[last.row][last.col] = null;
                currentPlayer = last.player;
                gameActive = true;
                winnerMsg.textContent = '';
                updateStatus();
                render();
            }

            function resetGame() {
                vibrate('heavy');
                gameContainer.style.display = 'none';
                setupScreen.style.display = 'flex';
                gameActive = false;
            }

            // Навешиваем события на кнопки
            document.getElementById('btn-x').addEventListener('click', () => start('X'));
            document.getElementById('btn-o').addEventListener('click', () => start('O'));
            document.getElementById('undo-move').addEventListener('click', undo);
            document.getElementById('reset-game').addEventListener('click', resetGame);
        });
    </script>
</body>
</html>
