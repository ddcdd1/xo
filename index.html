<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect 5 Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --grid-color: #000000;
            --x-color: #ff4d4d;
            --o-color: #4d79ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #setup-screen {
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 24px; margin-bottom: 30px; }

        .btn {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid var(--grid-color);
            background: #fff;
            margin: 5px;
            font-weight: bold;
            border-radius: 12px;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s, background 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        #game-container {
            display: none;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .status {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 1px;
            background-color: var(--grid-color);
            border: 2px solid var(--grid-color);
            width: 95vw;
            max-width: 450px;
            height: calc(95vw * 7 / 9); 
            max-height: calc(450px * 7 / 9);
            margin: 0 auto;
        }

        .cell {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(8vw, 30px);
            font-weight: 900;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }
        
        /* Стиль для черновика */
        .cell.draft { opacity: 0.35; }

        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 10px;
        }

        .undo-btn { background: #f0f0f0; border-color: #ccc; }
        .draft-btn { background: #e0f7fa; border-color: #00acc1; color: #00838f; }
        .draft-btn.active { background: #00acc1; color: #fff; border-color: #006064; }
        .restart-btn { background: #333; color: #fff; }

        #winner-msg {
            color: #28a745;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
            height: 22px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Кто ходит первым?</h1>
        <button class="btn" style="color:var(--x-color)" id="btn-x">Крестики (X)</button>
        <button class="btn" style="color:var(--o-color)" id="btn-o">Нолики (O)</button>
    </div>

    <div id="game-container">
        <div class="status" id="turn-indicator">Ход: Крестики</div>
        <div class="grid" id="board"></div>
        <div id="winner-msg"></div>
        <div class="controls">
            <button class="btn undo-btn" id="undo-move">↩ Отмена</button>
            <button class="btn draft-btn" id="draft-mode-btn">📝 Черновик: ВЫКЛ</button>
            <button class="btn restart-btn" id="reset-game">Заново</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let tg = null;
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                try {
                    tg.expand();
                    tg.ready();
                } catch (e) { console.error("Ошибка TG:", e); }
            }

            function vibrate(type) {
                if (!tg || !tg.HapticFeedback) return;
                try {
                    if (type === 'success') {
                        tg.HapticFeedback.notificationOccurred('success');
                    } else {
                        tg.HapticFeedback.impactOccurred(type);
                    }
                } catch (e) {}
            }

            const ROWS = 7;
            const COLS = 9;
            let board = [];
            let currentPlayer = 'X';
            let gameActive = false;
            let moveHistory = [];
            
            // Переменные для режима черновика
            let isDraftMode = false;
            let preDraftState = null;

            const setupScreen = document.getElementById('setup-screen');
            const gameContainer = document.getElementById('game-container');
            const boardEl = document.getElementById('board');
            const turnIndicator = document.getElementById('turn-indicator');
            const winnerMsg = document.getElementById('winner-msg');
            const draftBtn = document.getElementById('draft-mode-btn');

            function initBoard() {
                board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
            }

            function start(player) {
                vibrate('medium');
                currentPlayer = player;
                initBoard();
                moveHistory = [];
                gameActive = true;
                isDraftMode = false;
                preDraftState = null;
                
                draftBtn.textContent = '📝 Черновик: ВЫКЛ';
                draftBtn.classList.remove
